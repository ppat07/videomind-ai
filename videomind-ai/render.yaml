services:
  - type: web
    name: videomind-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/database_init.py && cd src && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "8000"
    healthCheckPath: /health
    # Custom loading page configuration
    preDeployCommand: echo "VideoMind AI deployment starting..."
    autoDeploy: true
    branch: main
    rootDir: .
    buildFilter:
      paths:
        - src/**
        - templates/**
        - requirements.txt
        - .env