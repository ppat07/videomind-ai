<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Batch Processing - VideoMind AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-6">
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
            <strong>🔒 ADMIN ONLY:</strong> This interface bypasses payment for directory population and testing.
        </div>
        
        <h1 class="text-2xl font-bold mb-6">Admin Batch Processing</h1>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-4">Batch Ingest via VideoMind Pipeline</h2>
            <p class="text-gray-600 mb-4">Paste YouTube URLs (one per line). We'll process transcripts + summaries and auto-publish to this directory.</p>
            
            <form id="adminBatchForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Email (for notifications)</label>
                    <input type="email" id="email" value="admin@videomind.ai" class="w-full p-2 border rounded">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Processing Tier</label>
                    <select id="tier" class="w-full p-2 border rounded">
                        <option value="basic">Basic ($3)</option>
                        <option value="detailed" selected>Detailed ($5)</option>
                        <option value="bulk">Bulk ($2)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">YouTube URLs (one per line)</label>
                    <textarea id="urls" rows="8" class="w-full p-2 border rounded" 
                        placeholder="https://www.youtube.com/watch?v=...&#10;https://www.youtube.com/watch?v=..."></textarea>
                </div>
                
                <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">
                    🔒 Admin Process (Bypasses Payment)
                </button>
            </form>
            
            <div id="results" class="mt-6 hidden">
                <h3 class="text-lg font-semibold mb-2">Processing Results</h3>
                <div id="resultsContent" class="bg-gray-100 p-4 rounded"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminBatchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const tier = document.getElementById('tier').value;
            const urls = document.getElementById('urls').value.split('\n').filter(u => u.trim());
            
            if (urls.length === 0) {
                alert('Please enter at least one YouTube URL');
                return;
            }
            
            // Admin batch processing endpoint (bypasses payment)
            try {
                const response = await fetch('/api/admin/batch-process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('videomind_admin:vm_admin_2026!')
                    },
                    body: JSON.stringify({
                        youtube_urls: urls,
                        email: email,
                        tier: tier
                    })
                });
                
                const result = await response.json();
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('resultsContent').innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
                
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
