<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoMind AI - Starting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #3730a3 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        
        .loading-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 80px 60px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }
        
        .logo-container {
            position: relative;
            margin-bottom: 32px;
        }
        
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            animation: pulse-ring 2s ease-out infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }
        
        .logo-icon {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }
        
        .logo-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        
        .brand-name {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(45deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 300;
            color: #cbd5e1;
        }
        
        .status-container {
            margin-bottom: 32px;
        }
        
        .status-message {
            font-size: 1em;
            margin-bottom: 24px;
            color: #e2e8f0;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 20%; }
            50% { width: 80%; }
            100% { width: 20%; }
        }
        
        .loading-steps {
            text-align: left;
            margin: 24px 0;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #94a3b8;
        }
        
        .step.active {
            color: #60a5fa;
        }
        
        .step-icon {
            font-size: 1.2em;
        }
        
        .footer-text {
            font-size: 0.85em;
            opacity: 0.6;
            margin-top: 32px;
            color: #94a3b8;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading-container > * {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <div class="logo-icon">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM8 15c0 .55-.45 1-1 1s-1-.45-1-1V9c0-.55.45-1 1-1s1 .45 1 1v6zm3 0c0 .55-.45 1-1 1s-1-.45-1-1V9c0-.55.45-1 1-1s1 .45 1 1v6zm3 0c0 .55-.45 1-1 1s-1-.45-1-1V9c0-.55.45-1 1-1s1 .45 1 1v6z"/>
                </svg>
            </div>
        </div>
        
        <div class="brand-name">VideoMind AI</div>
        <div class="tagline">Transform videos into AI training data</div>
        
        <div class="status-container">
            <div class="status-message">Initializing AI systems...</div>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <div class="loading-steps">
                <div class="step active">
                    <span class="step-icon">🤖</span>
                    <span>Loading AI transcription engines</span>
                </div>
                <div class="step active">
                    <span class="step-icon">🎥</span>
                    <span>Preparing video processing pipeline</span>
                </div>
                <div class="step">
                    <span class="step-icon">✨</span>
                    <span>Finalizing workspace setup</span>
                </div>
            </div>
        </div>
        
        <div class="footer-text">
            You'll be redirected automatically when ready
        </div>
    </div>
    
    <script>
        // Animate steps
        setTimeout(() => {
            document.querySelector('.step:nth-child(3)').classList.add('active');
        }, 2000);
        
        // Check if main app is ready
        function checkAppReady() {
            fetch('/health')
                .then(response => {
                    if (response.ok) {
                        window.location.href = '/';
                    }
                })
                .catch(() => {
                    setTimeout(checkAppReady, 3000);
                });
        }
        
        // Start checking after 8 seconds
        setTimeout(checkAppReady, 8000);
        
        // Fallback redirect after 45 seconds
        setTimeout(() => {
            window.location.href = '/';
        }, 45000);
    </script>
</body>
</html>
