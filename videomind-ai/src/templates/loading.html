<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoMind AI - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .loading-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-size: 1.4em;
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .loading-message {
            font-size: 1.1em;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-left: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-text {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 20px;
        }
        
        .features {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .checkmark {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">🧠 VideoMind AI</div>
        <div class="tagline">Transform any video into AI training data</div>
        
        <div class="loading-message">
            Preparing your video processing workspace...
        </div>
        
        <div class="spinner"></div>
        
        <div class="progress-text">
            This may take up to 30 seconds on first load
        </div>
        
        <div class="features">
            <div class="feature">
                <span class="checkmark">✓</span>
                <span>AI-Enhanced Transcripts</span>
            </div>
            <div class="feature">
                <span class="checkmark">✓</span>
                <span>Training Data Export</span>
            </div>
            <div class="feature">
                <span class="checkmark">✓</span>
                <span>Multiple Formats</span>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-redirect to main app after reasonable delay
        setTimeout(function() {
            window.location.reload();
        }, 45000);
    </script>
</body>
</html>
